<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"

  <title>Animals Gallery</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- HERO SECTION -->

  <section class="hero">

    <h1>Animals Gallery</h1>

    <a href="index.html" class="nav-btn">
      ← Back to Home
    </a>

  </section>

  <!-- EFFECT BUTTONS -->

  <div class="effects">

    <button onclick="setFilter('none')">
      Normal
    </button>

    <button onclick="setFilter('grayscale(100%)')">
      Grayscale
    </button>

    <button onclick="setFilter('sepia(100%)')">
      Sepia
    </button>

  </div>

  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <div class="top-controls">

      <button id="themeToggle">
        🌙
      </button>

      <button id="favoriteBtn">
        ❤️
      </button>

      <a id="downloadBtn" download>
        ⬇ Download
      </a>

    </div>

    <span class="close">
      &times;
    </span>

    <img
    class="lightbox-img"
    id="lightbox-img"
    alt=""
    >

    <div class="controls">

      <button id="prev">
        ❮
      </button>

      <button id="next">
        ❯
      </button>

    </div>

  </div>

  <script src="script.js"></script>
