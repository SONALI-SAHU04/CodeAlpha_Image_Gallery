  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <!-- TOP CONTROLS -->

    <div class="top-controls">

      <button id="themeToggle">
        🌙
      </button>

      <button id="favoriteBtn">
        ❤️
      </button>

      <a id="downloadBtn" download>
        ⬇ Download
      </a>

    </div>

    <!-- CLOSE BUTTON -->

    <span class="close">
      &times;
    </span>

    <!-- LIGHTBOX IMAGE -->

    <img
    class="lightbox-img"
    id="lightbox-img"
    alt=""
    >

    <!-- NAVIGATION -->

    <div class="controls">

      <button id="prev">
        ❮
      </button>

      <button id="next">
        ❯
      </button>

    </div>
