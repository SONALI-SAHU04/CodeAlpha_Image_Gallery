<!-- technology.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Technology Gallery</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- HERO SECTION -->

  <section class="hero">

    <h1>Technology Gallery</h1>

    <a href="index.html" class="nav-btn">
      ← Back to Home
    </a>

  </section>

 <!-- EFFECT BUTTONS -->

  <div class="effects">

    <button onclick="setFilter('none')">
      Normal
    </button>

    <button onclick="setFilter('grayscale(100%)')">
      Grayscale
    </button>

    <button onclick="setFilter('sepia(100%)')">
      Sepia
    </button>

  </div>

  <!-- GALLERY -->

  <div class="gallery">

    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1526379095098-d400fd0bf935?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1496171367470-9ed9a91ea931?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1535223289827-42f1e9919769?q=80&w=1200&auto=format&fit=crop">

  </div>

  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <!-- TOP CONTROLS -->

    <div class="top-controls">

      <button id="themeToggle">
        🌙
      </button>

      <button id="favoriteBtn">
        ❤️
      </button>

      <a id="downloadBtn" download>
        ⬇ Download
      </a>

    </div>

    <!-- CLOSE BUTTON -->

    <span class="close">
      &times;
    </span>

    <!-- LIGHTBOX IMAGE -->

    <img
    class="lightbox-img"
    id="lightbox-img"
    alt=""
    >

    <!-- NAVIGATION -->

    <div class="controls">

      <button id="prev">
        ❮
      </button>

      <button id="next">
        ❯
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
