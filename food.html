<!-- food.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Food Gallery</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- HERO SECTION -->

  <section class="hero">

    <h1>Food Gallery</h1>

    <a href="index.html" class="nav-btn">
      ← Back to Home
    </a>

  </section>

  <!-- EFFECT BUTTONS -->

  <div class="effects">

    <button onclick="setFilter('none')">
      Normal
    </button>

    <button onclick="setFilter('grayscale(100%)')">
      Grayscale
    </button>

    <button onclick="setFilter('sepia(100%)')">
      Sepia
    </button>

  </div>

  <!-- GALLERY -->

  <div class="gallery">

    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1529042410759-befb1204b468?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1502741338009-cac2772e18bc?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1504754524776-8f4f37790ca0?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1467003909585-2f8a72700288?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1526318896980-cf78c088247c?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1506084868230-bb9d95c24759?q=80&w=1200&auto=format&fit=crop">

  </div>

  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <!-- TOP CONTROLS -->

    <div class="top-controls">

      <button id="themeToggle">
        🌙
      </button>

      <button id="favoriteBtn">
        ❤️
      </button>

      <a id="downloadBtn" download>
        ⬇ Download
      </a>

    </div>

    <!-- CLOSE BUTTON -->

    <span class="close">
      &times;
    </span>

    <!-- LIGHTBOX IMAGE -->

    <img
    class="lightbox-img"
    id="lightbox-img"
    alt=""
    >

    <!-- NAVIGATION -->

    <div class="controls">

      <button id="prev">
        ❮
      </button>

      <button id="next">
        ❯
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
