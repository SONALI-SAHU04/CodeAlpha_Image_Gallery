<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Cars Gallery</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- HERO SECTION -->

  <section class="hero">

    <h1>Cars Gallery</h1>

    <a href="index.html" class="nav-btn">
      ← Back to Home
    </a>

  </section>

  <!-- EFFECT BUTTONS -->

  <div class="effects">

    <button onclick="setFilter('none')">
      Normal
    </button>

    <button onclick="setFilter('grayscale(100%)')">
      Grayscale
    </button>

    <button onclick="setFilter('sepia(100%)')">
      Sepia
    </button>

  </div>

  <!-- GALLERY -->

  <div class="gallery">

    <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1489824904134-891ab64532f1?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1519641471654-76ce0107ad1b?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1494905998402-395d579af36f?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1502161254066-6c74afbf07aa?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1504215680853-026ed2a45def?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=1200&auto=format&fit=crop">

  </div>

  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <!-- TOP CONTROLS -->

    <div class="top-controls">

      <button id="themeToggle">
        🌙
      </button>

      <button id="favoriteBtn">
        ❤️
      </button>

      <a id="downloadBtn" download>
        ⬇ Download
      </a>

    </div>

    <!-- CLOSE BUTTON -->

    <span class="close">
      &times;
    </span>

    <!-- LIGHTBOX IMAGE -->

    <img
    class="lightbox-img"
    id="lightbox-img"
    alt=""
    >

    <!-- NAVIGATION -->

    <div class="controls">

      <button id="prev">
        ❮
      </button>

      <button id="next">
        ❯
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
